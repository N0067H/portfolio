<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>백엔드 개발자 류승엽</title>
  <style>
    /* ===== CSS VARIABLES ===== */
    :root {
      --bg: #FFFFFF;
      --accent: #2D3580;
      --accent2: #C8520A;
      --text: #1A1A1A;
      --header-bg: #2D3580;
      --divider: #D0D5E8;
      --surface: rgba(45,53,128,0.05);
      --surface-b: rgba(45,53,128,0.09);
      --fs-xs: 12px;
      --fs-sm: 13px;
      --fs-base: 15px;
      --fs-md: 18px;
      --fs-lg: 22px;
      --fs-xl: 26px;
      --fs-2xl: 32px;
      --fw-normal: 400;
      --fw-medium: 500;
      --fw-bold: 700;
      --radius-sm: 4px;
      --radius: 8px;
      --radius-lg: 12px;
      --gap-xs: 4px;
      --gap-sm: 8px;
      --gap: 16px;
      --gap-lg: 24px;
      --gap-xl: 40px;
      --gap-2xl: 64px;
      --max-w: 880px;
      --header-h: 56px;
      --transition: 0s;
    }

    /* ===== RESET ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    ul { list-style: none; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* ===== BASE ===== */
    body {
      font-family: 'Malgun Gothic', '맑은 고딕', sans-serif;
      font-size: var(--fs-base);
      line-height: 1.75;
      color: var(--text);
      background: var(--bg);
      transition: background var(--transition), color var(--transition);
    }
    code, .mono {
      font-family: 'Malgun Gothic', '맑은 고딕', sans-serif;
      font-size: 0.88em;
    }

    /* ===== LAYOUT ===== */
    .container {
      max-width: var(--max-w);
      margin: 0 auto;
      padding: 0 var(--gap-lg);
    }
    .section-gap { margin-top: var(--gap-2xl); }

    /* ===== HEADER ===== */
    #site-header {
      position: sticky;
      top: 0;
      z-index: 100;
      height: var(--header-h);
      background: var(--bg);
      border-bottom: 1px solid var(--divider);
      transition: background var(--transition);
    }
    .header-inner {
      max-width: var(--max-w);
      margin: 0 auto;
      padding: 0 var(--gap-lg);
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .site-title {
      font-size: var(--fs-md);
      font-weight: var(--fw-bold);
      color: var(--text);
    }
    .site-title em {
      color: var(--accent);
      font-style: normal;
    }
    .header-right {
      display: flex;
      align-items: center;
      gap: var(--gap-lg);
    }
    .main-nav { display: flex; gap: var(--gap-lg); }
    .main-nav a {
      font-size: var(--fs-sm);
      font-weight: var(--fw-medium);
      color: var(--text);
      opacity: 0.65;
      transition: opacity var(--transition);
    }
    .main-nav a:hover { opacity: 1; text-decoration: none; }
    .mobile-menu-btn {
      display: none;
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      color: var(--text);
    }
    .mobile-menu {
      display: none;
      position: fixed;
      top: var(--header-h);
      left: 0; right: 0;
      background: var(--bg);
      border-bottom: 1px solid var(--divider);
      padding: var(--gap);
      flex-direction: column;
      gap: var(--gap);
      z-index: 99;
    }
    .mobile-menu.open { display: flex; }
    .mobile-menu a {
      color: var(--text);
      font-size: var(--fs-base);
      padding: var(--gap-sm) 0;
      border-bottom: 1px solid var(--divider);
    }

    /* ===== HERO ===== */
    #hero { padding: 52px 0 var(--gap-xl); }
    .hero-name {
      font-size: var(--fs-2xl);
      font-weight: var(--fw-bold);
      line-height: 1.2;
      margin-bottom: var(--gap-lg);
    }
    .hero-role {
      font-size: var(--fs-lg);
      color: var(--accent);
      font-weight: var(--fw-medium);
      margin-bottom: var(--gap-lg);
    }
    .hero-contact {
      display: flex;
      flex-wrap: wrap;
      gap: 4px var(--gap-lg);
      margin-bottom: var(--gap-lg);
      font-size: var(--fs-sm);
      opacity: 0.7;
    }
    .hero-contact a { color: inherit; }
    .hero-tagline {
      max-width: 720px;
      line-height: 1.8;
      opacity: 0.85;
      word-break: keep-all;
    }

    /* ===== SECTION TITLE ===== */
    .section-title {
      font-size: var(--fs-xl);
      font-weight: var(--fw-bold);
      padding-bottom: var(--gap-sm);
      border-bottom: 2px solid var(--accent);
      display: inline-block;
      margin-bottom: var(--gap-lg);
    }

    /* ===== ABOUT ===== */
    .about-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--gap-xl);
      align-items: start;
    }
    .bio-group { margin-bottom: var(--gap-lg); }
    .bio-label {
      font-size: var(--fs-xs);
      font-weight: var(--fw-bold);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--accent);
      margin-bottom: var(--gap-xs);
    }
    .bio-items { display: flex; flex-direction: column; gap: 3px; font-size: var(--fs-sm); }
    .bio-main { display: flex; flex-direction: column; }
    .bio-sub { font-size: var(--fs-xs); opacity: 0.55; margin-top: 1px; }
    .skill-group { margin-bottom: var(--gap-lg); }
    .skill-group-title {
      font-size: var(--fs-xs);
      font-weight: var(--fw-bold);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--accent);
      margin-bottom: var(--gap-xs);
    }
    .badges { display: flex; flex-wrap: wrap; gap: var(--gap-xs); }
    .badge {
      background: var(--surface-b);
      border: 1px solid var(--divider);
      border-radius: var(--radius-sm);
      padding: 2px 9px;
      font-size: var(--fs-xs);
      font-weight: var(--fw-medium);
      font-family: 'Malgun Gothic', '맑은 고딕', sans-serif;
    }

    /* ===== MAIN PROJECT ===== */
    .main-project {
      margin-bottom: var(--gap-2xl);
      border: 1px solid var(--divider);
      border-radius: var(--radius-lg);
    }
    .mp-header {
      background: var(--header-bg);
      color: #fff;
      padding: var(--gap-lg) var(--gap-xl);
      border-radius: var(--radius-lg) var(--radius-lg) 0 0;
      overflow: hidden;
    }
    .mp-header h3 {
      font-size: var(--fs-xl);
      font-weight: var(--fw-bold);
      margin-bottom: 4px;
    }
    .mp-subtitle { font-size: var(--fs-base); opacity: 0.85; margin-bottom: 6px; }
    .mp-period { font-size: var(--fs-xs); opacity: 0.65; margin-bottom: var(--gap-sm); }
    .mp-metrics {
      display: flex;
      flex-wrap: wrap;
      gap: var(--gap-lg);
      background: rgba(0,0,0,0.22);
      margin: var(--gap-sm) calc(-1 * var(--gap-xl)) calc(-1 * var(--gap-lg));
      padding: var(--gap) var(--gap-xl);
    }
    .mp-metric { text-align: left; }
    .mp-metric-value {
      font-size: var(--fs-lg);
      font-weight: var(--fw-bold);
      font-family: 'Malgun Gothic', '맑은 고딕', sans-serif;
      color: #fff;
      display: block;
    }
    .mp-metric-label { font-size: var(--fs-xs); opacity: 0.7; }
    .mp-stack { display: flex; flex-wrap: wrap; gap: var(--gap-xs); margin-bottom: var(--gap-sm); }
    .mp-stack-badge {
      background: rgba(255,255,255,0.15);
      color: #fff;
      font-size: var(--fs-xs);
      padding: 2px 8px;
      border-radius: var(--radius-sm);
    }
    .mp-links { margin-top: 4px; }
    .mp-links a {
      color: rgba(255,255,255,0.75);
      font-size: var(--fs-sm);
      text-decoration: underline;
      margin-right: var(--gap-sm);
    }
    .mp-body { padding: var(--gap-xl); }
    .mp-divider { height: 1px; background: var(--divider); margin: var(--gap-xl) 0; }
    .mp-label {
      font-size: var(--fs-sm);
      font-weight: var(--fw-bold);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--accent);
      border-left: 3px solid var(--accent);
      padding-left: var(--gap-sm);
      margin-bottom: var(--gap);
    }

    /* Lists */
    .problem-list li,
    .tech-reason-list li,
    .features-list li,
    .impl-list li,
    .future-list li {
      padding-left: var(--gap-lg);
      position: relative;
      margin-bottom: var(--gap-sm);
      line-height: 1.75;
    }
    .problem-list li::before { content: '·'; position: absolute; left: 0; color: var(--accent); }
    .tech-reason-list li::before { content: '·'; position: absolute; left: 0; color: var(--accent); }
    .features-list li::before { content: '·'; position: absolute; left: 0; color: var(--accent); }
    .future-list li::before { content: '·'; position: absolute; left: 0; color: var(--accent); }
    .impl-list li::before { content: '▸'; position: absolute; left: 0; color: var(--accent2); font-size: 0.75em; top: 0.25em; }

    /* Arch placeholder */
    .arch-img {
      width: 750px;
      max-width: 100%;
      height: auto;
      border-radius: var(--radius);
      display: block;
    }
    .data-model-img {
      max-width: 720px;
      width: 100%;
      height: auto;
      border-radius: var(--radius);
      display: block;
      margin: 0 auto;
    }
    .arch-placeholder {
      width: 100%;
      aspect-ratio: 750 / 506;
      background: var(--surface);
      border: 2px dashed var(--divider);
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Malgun Gothic', '맑은 고딕', sans-serif;
      font-size: var(--fs-sm);
      opacity: 0.5;
      letter-spacing: 0.04em;
    }

    /* Stack table */
    .stack-table {
      width: 100%;
      border-collapse: collapse;
      font-size: var(--fs-sm);
    }
    .stack-table th {
      text-align: left;
      padding: var(--gap-sm) var(--gap);
      background: var(--surface);
      font-size: var(--fs-xs);
      font-weight: var(--fw-bold);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      border-bottom: 1px solid var(--divider);
    }
    .stack-table td {
      padding: var(--gap-sm) var(--gap);
      border-bottom: 1px solid var(--divider);
      vertical-align: top;
    }
    .stack-table td:first-child {
      font-weight: var(--fw-bold);
      width: 110px;
      color: var(--accent);
      font-family: 'Malgun Gothic', '맑은 고딕', sans-serif;
      font-size: var(--fs-xs);
      text-transform: uppercase;
    }
    .stack-table code {
      background: var(--surface);
      padding: 1px 6px;
      border-radius: 3px;
    }

    /* Data model */
    .data-model-block {
      background: var(--surface);
      border: 1px solid var(--divider);
      border-radius: var(--radius);
      padding: var(--gap);
      font-family: 'Malgun Gothic', '맑은 고딕', sans-serif;
      font-size: var(--fs-sm);
      white-space: pre-wrap;
      line-height: 1.8;
    }

    /* Troubleshooting */
    .ts-block {
      border: 1px solid var(--divider);
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: var(--gap);
    }
    .ts-header {
      background: var(--surface);
      padding: var(--gap-sm) var(--gap);
      font-size: var(--fs-sm);
      font-weight: var(--fw-bold);
      border-bottom: 1px solid var(--divider);
      display: flex;
      align-items: center;
      gap: var(--gap-sm);
    }
    .ts-num {
      background: var(--accent2);
      color: #fff;
      font-size: 10px;
      padding: 1px 7px;
      border-radius: 3px;
      font-weight: var(--fw-bold);
      flex-shrink: 0;
    }
    .ts-body { display: grid; grid-template-columns: 1fr 1fr; }
    .ts-cell {
      padding: var(--gap) var(--gap-lg);
      border-right: 1px solid var(--divider);
    }
    .ts-cell:last-child { border-right: none; }
    .ts-cell-full {
      padding: var(--gap) var(--gap-lg);
      border-top: 1px solid var(--divider);
    }
    .ts-lbl {
      font-size: var(--fs-sm);
      font-weight: var(--fw-bold);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--accent);
      margin-bottom: var(--gap-sm);
    }
    .ts-val { font-size: var(--fs-base); line-height: 1.75; }

    /* Performance */
    .perf-table { width: 100%; border-collapse: collapse; }
    .perf-table th {
      font-size: var(--fs-xs);
      font-weight: var(--fw-bold);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: var(--gap-sm) var(--gap);
      text-align: left;
      border-bottom: 2px solid var(--divider);
    }
    .perf-table th.col-before { color: #888; }
    .perf-table th.col-after { color: var(--accent); }
    .perf-table td {
      padding: var(--gap-sm) var(--gap);
      border-bottom: 1px solid var(--divider);
      font-size: var(--fs-sm);
      vertical-align: top;
    }
    .perf-table td.col-label { font-weight: var(--fw-bold); }
    .perf-table td.col-before { color: #888; }
    .perf-table td.col-after { color: var(--accent); font-weight: var(--fw-bold); }
    .perf-table tr:last-child td { border-bottom: none; }

    /* Tradeoffs table */
    .tradeoffs-table { width: 100%; border-collapse: collapse; }
    .tradeoffs-table th {
      font-size: var(--fs-xs);
      font-weight: var(--fw-bold);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: var(--gap-sm) var(--gap);
      text-align: left;
      border-bottom: 2px solid var(--divider);
    }
    .tradeoffs-table th.col-cost { color: #888; }
    .tradeoffs-table th.col-reason { color: var(--accent); }
    .tradeoffs-table td {
      padding: var(--gap-sm) var(--gap);
      border-bottom: 1px solid var(--divider);
      font-size: var(--fs-sm);
      vertical-align: top;
      line-height: 1.6;
    }
    .tradeoffs-table td.col-decision { font-weight: var(--fw-bold); white-space: nowrap; }
    .tradeoffs-table td.col-cost { color: #888; }
    .tradeoffs-table td.col-reason { }
    .tradeoffs-table tr:last-child td { border-bottom: none; }

    /* Retrospective */
    .retro-block {
      background: var(--surface);
      border-left: 3px solid var(--accent2);
      border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
      padding: var(--gap) var(--gap-lg);
      font-size: var(--fs-base);
      line-height: 1.85;
    }

    /* ===== SMALL PROJECTS ===== */
    .small-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: var(--gap);
    }
    .small-card {
      border: 1px solid var(--divider);
      border-radius: var(--radius);
      padding: var(--gap-lg);
      background: var(--surface);
      transition: box-shadow var(--transition);
    }
    .small-card:hover { box-shadow: none; }
    .small-card-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 4px;
    }
    .small-card-title { font-size: var(--fs-md); font-weight: var(--fw-bold); }
    .small-card-link { font-size: var(--fs-sm); opacity: 0.55; }
    .small-card-period { font-size: var(--fs-xs); opacity: 0.55; margin-bottom: var(--gap-sm); }
    .small-card-desc { font-size: var(--fs-sm); line-height: 1.65; margin-bottom: var(--gap-sm); }

    /* ===== ACTIVITIES ===== */
    .activity-group { margin-bottom: var(--gap-xl); }
    .activity-year {
      font-size: var(--fs-lg);
      font-weight: var(--fw-bold);
      color: var(--accent);
      font-family: 'Malgun Gothic', '맑은 고딕', sans-serif;
      margin-bottom: var(--gap-sm);
    }
    .activity-list {
      border-left: 2px solid var(--divider);
      padding-left: var(--gap-lg);
      display: flex;
      flex-direction: column;
      gap: var(--gap-sm);
    }
    .activity-item { display: flex; gap: var(--gap); align-items: baseline; }
    .activity-date {
      font-size: var(--fs-xs);
      color: var(--accent2);
      font-weight: var(--fw-bold);
      font-family: 'Malgun Gothic', '맑은 고딕', sans-serif;
      min-width: 60px;
      flex-shrink: 0;
    }
    .activity-text { font-size: var(--fs-sm); line-height: 1.6; }

    /* ===== FOOTER ===== */
    #footer {
      margin-top: var(--gap-2xl);
      border-top: 1px solid var(--divider);
      padding: var(--gap-xl) 0;
      text-align: center;
      font-size: var(--fs-xs);
      opacity: 0.45;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 768px) {
      :root {
        --fs-2xl: 26px;
        --fs-xl: 20px;
        --gap-2xl: 48px;
        --gap-xl: 28px;
      }
      .main-nav { display: none; }
      .mobile-menu-btn { display: flex; }
      .about-grid { grid-template-columns: 1fr; }
      .ts-body { grid-template-columns: 1fr; }
      .ts-cell { border-right: none; border-bottom: 1px solid var(--divider); }
      .ts-cell:last-child { border-bottom: none; }
      .perf-table th, .perf-table td { padding: var(--gap-sm) 8px; }
      .small-grid { grid-template-columns: 1fr; }
      .mp-header { padding: var(--gap) var(--gap-lg); }
      .mp-body { padding: var(--gap-lg); }
    }
    @media (min-width: 1024px) {
      .small-grid { grid-template-columns: repeat(3, 1fr); }
    }

    /* ===== PRINT ===== */
    @media print {
      .dark-toggle, .mobile-menu, .mobile-menu-btn, #site-header { display: none !important; }
      a { text-decoration: underline !important; color: var(--accent) !important; }
      body { -webkit-print-color-adjust: exact; print-color-adjust: exact; color: var(--text) !important; font-size: 11px; }
      #site-header { position: static; }
      .main-project { page-break-inside: avoid; break-inside: avoid; }
      .ts-block, .perf-table, .tradeoffs-table, .small-card { page-break-inside: avoid; break-inside: avoid; }
      .section-gap { margin-top: 36px; }
      .about-grid { grid-template-columns: 1fr 1fr !important; }
      @page {
        size: A4;
        margin: 10mm 10mm 16mm 10mm;
        @bottom-center {
          content: counter(page) " / " counter(pages);
          font-size: 9px;
          color: #888;
        }
      }
    }
  </style>
</head>
<body>

<!-- ===== SECTION: header ===== -->
<header id="site-header">
  <div class="header-inner">
    <div class="site-title">류승엽</div>
    <div class="header-right">
      <nav class="main-nav">
        <a href="#about">About</a>
        <a href="#projects">Projects</a>
        <a href="#activities">Activities</a>
      </nav>
      <button class="mobile-menu-btn" id="mob-btn" aria-label="메뉴">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <rect y="3" width="20" height="2" rx="1" fill="currentColor"/>
          <rect y="9" width="20" height="2" rx="1" fill="currentColor"/>
          <rect y="15" width="20" height="2" rx="1" fill="currentColor"/>
        </svg>
      </button>
    </div>
  </div>
</header>

<div class="mobile-menu" id="mob-menu">
  <a href="#about" onclick="closeMob()">About</a>
  <a href="#projects" onclick="closeMob()">Projects</a>
  <a href="#activities" onclick="closeMob()">Activities</a>
</div>

<main>
  <div class="container">

    <!-- ===== SECTION: hero ===== -->
    <section id="hero"><div id="hero-root"></div></section>

    <!-- ===== SECTION: about ===== -->
    <section id="about" class="section-gap">
      <h2 class="section-title">About</h2>
      <div id="about-root"></div>
    </section>

    <!-- ===== SECTION: main-projects ===== -->
    <section id="projects" class="section-gap">
      <h2 class="section-title">Main Projects</h2>
      <div id="mp-root"></div>
    </section>

    <!-- ===== SECTION: small-projects ===== -->
    <section id="small-projects" class="section-gap">
      <h2 class="section-title">More Projects</h2>
      <div id="sp-root"></div>
    </section>

    <!-- ===== SECTION: activities ===== -->
    <section id="activities" class="section-gap">
      <h2 class="section-title">Activities</h2>
      <div id="act-root"></div>
    </section>

  </div>
</main>

<footer id="footer">백엔드 개발자 류승엽 · 2026</footer>

<!-- ===== DATA ===== -->

<script>
  /* ── Mobile menu ── */
  function initMob() {
    document.getElementById('mob-btn').addEventListener('click', () =>
      document.getElementById('mob-menu').classList.toggle('open'));
  }
  function closeMob() {
    document.getElementById('mob-menu').classList.remove('open');
  }

  /* ── Helpers ── */
  const e = (s) => String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  const r = (s) => e(s).replace(/&lt;strong&gt;/g,'<strong>').replace(/&lt;\/strong&gt;/g,'</strong>').replace(/&lt;br&gt;/g,'<br>');

  const badge = (t) => `<span class="badge">${e(t)}</span>`;
  const hr = () => '<div class="mp-divider"></div>';
  const lbl = (t) => `<div class="mp-label">${e(t)}</div>`;

  /* ── Hero ── */
  function renderHero(d) {
    const { name, role, tagline, contact } = d;
    const contacts = [];
    if (contact.email) contacts.push(`<a href="mailto:${e(contact.email)}">${e(contact.email)}</a>`);
    if (contact.tel)   contacts.push(`<span>${e(contact.tel)}</span>`);
    if (contact.github) contacts.push(`<a href="https://github.com/${e(contact.github)}" target="_blank">GitHub @${e(contact.github)}</a>`);
    document.getElementById('hero-root').innerHTML = `
      <h1 class="hero-name">${e(name)}</h1>
      ${role ? `<div class="hero-role">${e(role)}</div>` : ''}
      ${contacts.length ? `<div class="hero-contact">${contacts.join('')}</div>` : ''}
      <p class="hero-tagline">${(Array.isArray(tagline) ? tagline : [tagline]).map(t => t ? `<span style="display:block">${r(t)}</span>` : '<span style="display:block;margin-top:0.4em"></span>').join('')}</p>
    `;
  }

  /* ── About ── */
  function renderAbout(d) {
    const bio = d.bio.map(g => `
      <div class="bio-group">
        <div class="bio-label">${e(g.label)}</div>
        <div class="bio-items">${g.items.map(t => typeof t === 'string'
          ? `<div>${e(t)}</div>`
          : `<div class="bio-main">${e(t.main)}<span class="bio-sub">${e(t.sub)}</span></div>`
        ).join('')}</div>
      </div>
    `).join('');
    const skills = Object.entries(d.skills).map(([cat, items]) => `
      <div class="skill-group">
        <div class="skill-group-title">${e(cat)}</div>
        <div class="badges">${items.map(badge).join('')}</div>
      </div>
    `).join('');
    document.getElementById('about-root').innerHTML = `
      <div class="about-grid">
        <div>${bio}</div>
        <div>${skills}</div>
      </div>
    `;
  }

  /* ── Troubleshooting template ── */
  function renderTS(list) {
    return list.map((t, i) => `
      <div class="ts-block">
        <div class="ts-header">
          <span class="ts-num">TS-${i+1}</span>
          <span>${e(t.problem)}</span>
        </div>
        <div class="ts-body">
          <div class="ts-cell"><div class="ts-lbl">원인</div><div class="ts-val">${r(t.cause)}</div></div>
          <div class="ts-cell"><div class="ts-lbl">해결</div><div class="ts-val">${r(t.solution)}</div></div>
        </div>
        <div class="ts-cell-full"><div class="ts-lbl">결과</div><div class="ts-val">${r(t.result)}</div></div>
      </div>
    `).join('');
  }

  function renderTradeoffs(list) {
    if (!list || !list.length) return '';
    const rows = list.map(t => `
      <tr>
        <td class="col-decision">${e(t.decision)}</td>
        <td class="col-cost">${e(t.cost)}</td>
        <td class="col-reason">${e(t.reason)}</td>
      </tr>`).join('');
    return `<table class="tradeoffs-table">
      <thead><tr>
        <th>결정</th>
        <th class="col-cost">포기한 것</th>
        <th class="col-reason">판단 근거</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
  }

  function renderPerf(perf) {
    const rows = perf.rows.map(r => `
      <tr>
        <td class="col-label">${e(r.label)}</td>
        <td class="col-before">${e(r.before)}</td>
        <td class="col-after">${e(r.after)}</td>
      </tr>`).join('');
    return `<table class="perf-table">
      <thead><tr>
        <th>항목</th>
        <th class="col-before">BEFORE</th>
        <th class="col-after">AFTER</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
  }

  /* ── Main project template ── */
  function renderMP(p) {
    const links = (p.links||[]).filter(l=>l.url)
      .map(l=>`<a href="${e(l.url)}" target="_blank">${e(l.label)}</a>`).join(' · ');

      <div class="mp-metric">
        <span class="mp-metric-value">${e(m.value)}</span>
        <span class="mp-metric-label">${e(m.label)}</span>
      </div>`).join('');
    const stackBadges = p.stack.map(([,v])=>`<span class="mp-stack-badge">${e(v)}</span>`).join('');
    const li = (cls, items) => items.map(x=>`<li>${r(x)}</li>`).join('');

    return `
      <div class="main-project">
        <div class="mp-header">
          <h3>${e(p.title)}</h3>
          <div class="mp-subtitle">${e(p.subtitle)}</div>
          ${p.period ? `<div class="mp-period">${e(p.period)}</div>` : ''}
          ${stackBadges ? `<div class="mp-stack">${stackBadges}</div>` : ''}
          ${links ? `<div class="mp-links">${links}</div>` : ''}
          ${metrics ? `<div class="mp-metrics">${metrics}</div>` : ''}
        </div>
        <div class="mp-body">

          ${lbl('프로젝트 계기')}
          <ul class="problem-list">${li('',p.problem)}</ul>

          ${hr()}
          ${lbl('아키텍처')}
          ${p.archImage
            ? `<img src="${e(p.archImage)}" class="arch-img" alt="${e(p.title)} 아키텍처" loading="lazy">`
            : `<div class="arch-placeholder">ARCHITECTURE PLACEHOLDER · 750 × 506</div>`}

          ${hr()}
          ${lbl('기술 선택 이유')}
          <ul class="tech-reason-list">${li('',p.techReason)}</ul>

          ${p.tradeoffs && p.tradeoffs.length ? `${hr()}${lbl('핵심 의사결정')}${renderTradeoffs(p.tradeoffs)}` : ''}

          ${hr()}
          ${lbl('데이터 모델')}
          ${p.dataModelImage
            ? `<img src="${e(p.dataModelImage)}" class="data-model-img" alt="${e(p.title)} 데이터 모델" loading="lazy">`
            : `<div class="data-model-block">${e(p.dataModel)}</div>`}

          ${hr()}
          ${lbl('핵심 기능')}
          <ul class="features-list">${li('',p.features)}</ul>

          ${hr()}
          ${lbl('구현 포인트')}
          <ul class="impl-list">${li('',p.implPoints||[])}</ul>

          ${hr()}
          ${lbl('트러블슈팅')}
          ${renderTS(p.troubleshooting)}

          ${hr()}
          ${lbl('성능 개선')}
          ${renderPerf(p.performance)}

          ${hr()}
          ${lbl('회고')}
          <div class="retro-block">${e(p.retrospective)}</div>

          ${hr()}
          ${lbl('향후 개선')}
          <ul class="future-list">${li('',p.future)}</ul>

        </div>
      </div>`;
  }

  /* ── Small card template ── */
  function renderSP(p) {
    const link = p.link ? `<a class="small-card-link" href="${e(p.link)}" target="_blank">GitHub</a>` : '';
    return `
      <div class="small-card">
        <div class="small-card-head">
          <span class="small-card-title">${e(p.title)}</span>
          ${link}
        </div>
        ${p.period ? `<div class="small-card-period">${e(p.period)}</div>` : ''}
        <div class="small-card-desc">${e(p.desc)}</div>
        <div class="badges">${p.stack.map(badge).join('')}</div>
      </div>`;
  }

  /* ── Activities ── */
  function renderAct(list) {
    return list.map(g => `
      <div class="activity-group">
        <div class="activity-year">${e(g.year)}</div>
        <div class="activity-list">
          ${g.items.map(i=>`
            <div class="activity-item">
              <span class="activity-date">${e(i.date)}</span>
              <span class="activity-text">${e(i.text)}</span>
            </div>`).join('')}
        </div>
      </div>`).join('');
  }

  /* ── Main ── */
  (function () {
    const D = JSON.parse(document.getElementById('data').textContent);
    initMob();
    renderHero(D.hero);
    renderAbout(D.about);
    document.getElementById('mp-root').innerHTML = D.mainProjects.map(renderMP).join('');
    document.getElementById('sp-root').innerHTML = `<div class="small-grid">${D.smallProjects.map(renderSP).join('')}</div>`;
    document.getElementById('act-root').innerHTML = renderAct(D.activities);
  })();
</script>
</body>
</html>
